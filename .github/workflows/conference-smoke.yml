name: conference-smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  conference-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: conference / reviewer smoke
        run: bash scripts/conference_smoke.sh
