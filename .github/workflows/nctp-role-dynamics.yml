name: nctp-role-dynamics

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nctp-role-dynamics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -q -r requirements-ci.lock
      - name: lint NCTP role dynamics
        run: ruff check src/ctios/nctp_state/role_dynamics.py tools/nctp_role_dynamics_smoke.py src/ctios/nctp_state/role_metrics.py tools/nctp_role_metrics_smoke.py
      - name: type NCTP role dynamics
        run: mypy --strict src/ctios/nctp_state/role_dynamics.py src/ctios/nctp_state/role_metrics.py
      - name: run NCTP role dynamics smoke
        run: PYTHONPATH=src python tools/nctp_role_dynamics_smoke.py
      - name: run NCTP role metrics smoke
        run: PYTHONPATH=src python tools/nctp_role_metrics_smoke.py
