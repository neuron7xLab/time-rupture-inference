    domain: predictive_coding
    supports_claim_ids: [TRI-CLAIM-019]
    supports_repo_files: [docs/MANUAL_REVIEW_NOTES.md]
    allowed_use: "Broad predictive-processing context only."
    forbidden_use: "Never direct support for a scalar estimator on a synthetic benchmark."
    boundary: "Context only; not operational proof."
