name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Release needs write + OIDC for keyless build-provenance attestation.
# Allowed for a release workflow only (workflow-trust audit exempts
# release.yml from the non-release write ban).
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      # MANDATORY ORDER: deps -> gate -> build -> SBOM -> attest -> upload
      - name: install (pinned lock)
        run: python -m pip install -q -r requirements-ci.lock
      - name: gate — full test suite (before any build/attest)
        run: PYTHONPATH=src pytest tests -q
      - name: gate — frozen runner (before any build/attest)
        run: PYTHONPATH=src python -m ctios.runner --mode full
      - name: build sdist + wheel
        run: |
          python -m pip install -q "build==1.5.0"
          python -m build
      - name: generate SBOM (SPDX, from the pinned lock)
        run: python scripts/generate_sbom.py
      - name: attest build provenance (SLSA Build L2)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/*"
      - name: upload release assets (AFTER gate + attest)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/* sbom.spdx.json \
            --title "${GITHUB_REF_NAME}" \
            --notes "Attested build (SLSA Build L2). Verify per docs/RELEASE_VERIFICATION.md."
