name: nctp-role-dynamics

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nctp-role-dynamics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install -q -r requirements-ci.lock
      - name: lint NCTP role dynamics
        run: ruff check src/ctios/nctp_state/role_dynamics.py tools/nctp_role_dynamics_smoke.py
      - name: type NCTP role dynamics
        run: mypy --strict src/ctios/nctp_state/role_dynamics.py
      - name: run NCTP role dynamics smoke
        run: PYTHONPATH=src python tools/nctp_role_dynamics_smoke.py
