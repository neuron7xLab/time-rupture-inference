name: v7-readiness

on:
  push:
    branches: [main, "gcp/**"]
  pull_request:
  workflow_dispatch:

# No GCP credentials. No cloud calls. CPU-only readiness gates.
permissions:
  contents: read

jobs:
  v7-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install -q -r requirements-ci.lock
      - name: minimal syntax / lint
        run: |
          ruff check src tests scripts
          bash -n scripts/gcp/doctor.sh
          bash -n scripts/gcp/dry_run_plan.sh
          bash -n scripts/gcp/create_cpu_vm.sh
          bash -n scripts/gcp/cleanup.sh
      - name: unit tests
        run: PYTHONPATH=src pytest tests -q
      - name: v7 config validation
        run: PYTHONPATH=src pytest tests/test_v7_config.py -q
      - name: v7 CPU smoke run
        run: python scripts/run_v7_cpu.py --mode smoke
      - name: v7 artifact schema validation
        run: python scripts/check_artifacts.py
      - name: gcp dry-run is non-destructive
        run: bash scripts/gcp/dry_run_plan.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: v7-artifacts
          path: |
            artifacts/v7/
            artifacts/gcp/
