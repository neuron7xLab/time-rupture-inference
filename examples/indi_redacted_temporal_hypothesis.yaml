# SPDX-License-Identifier: MIT
# Redacted hypothesis skeleton — DEMONSTRATION ONLY.
#
# A *shape*, not a research result. No private mechanism, dataset,
# strategy, or theorem content. The private mechanism is attached
# locally as an opaque Probe (ctios.opaque_probe) and is never
# committed. Loadable by ctios.redacted_io.load_redacted_spec.
# See docs/PRIVATE_RND_PROTOCOL.md.

hypothesis_id: indi_redacted_temporal_hypothesis_demo

claim: >-
  A private estimator infers a hidden temporal regime change from its
  own prediction error faster than a hard-wired baseline, on a
  structure the collaborator asserts is privately defined.

null: >-
  The private estimator does not separate from the hard-wired baseline
  on the pinned post-rupture metric.

assumptions:
  - The hidden regime change is unobserved by the estimator.
  - The estimator receives only the realized signal, never the regime,
    the switch time, or the noise.
  - The private mechanism is supplied as an opaque local probe and is
    not disclosed to the engine.

variables:
  - name: hidden_regime_shift_magnitude
    role: manipulated
    description: abstract name only; realization stays private
  - name: post_rupture_error
    role: measured
    description: the falsifier surface (a scalar the probe exposes)
  - name: negative_control_probe
    role: control
    description: degenerate baseline that must fail the falsifiers

falsifiers:
  - metric: post_rupture_error
    op: "<="
    threshold_key: error_ceiling
    threshold: 1.0          # placeholder; pinned before any real run
  - metric: separation_vs_baseline
    op: ">="
    threshold_key: min_separation
    threshold: 0.10         # placeholder; pinned before any real run

# <!-- claims:disclaimer -->
# This block enumerates inferences the result may NEVER support — it is
# a hard negative boundary, not a positioning claim.
forbidden_inferences:
  - The estimator has cognition, understanding, or awareness of time.
  - The estimator is conscious, sentient, or brain-like.
  - The result proves a general theory of time or general intelligence.
  - A survived check proves the collaborator's private theorem correct.
# <!-- claims:end -->

evidence_requirements:
  - artifact: sealed_verdict_json
    description: FALSIFY_<hid>.json with battery + spec sha256
  - artifact: falsifier_battery_json
    description: adversarial battery v2 outcomes
  - artifact: pinned_spec_sha256
    description: deterministic hash over claim + falsifiers + boundary

# Mandatory: no restart without a human decision.
human_review_required: true
# The private mechanism is a LOCAL probe; never committed here.
commit_private_content: false
# Free-text notes the collaborator keeps OUTSIDE this repository.
reviewer_notes: "free-text private notes kept outside repository"

next_experiment_policy:
  auto_run: false                      # never executed automatically
  tighten_surviving_checks: true       # survivors made stricter (x0.9)
  loosen_failed_checks: false          # a failed check is never relaxed
  failed_boundary_becomes_focus: true  # what broke is the next subject

# To reuse: copy this file, replace every value, keep the field names.
# Do not overfit to the bundled temporal benchmark.
