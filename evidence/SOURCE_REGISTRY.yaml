# Claim-support source registry (not a bibliography).
# A source may exist here ONLY if it maps to >=1 claim_id (matrix) or
# repo file. Consumed by scripts/check_doc_trust.py + tests; rendered
# human mirror is docs/REFERENCES.md (kept in sync, gate-enforced).
# Required keys per source: id, tier, canonical_citation, url, domain,
# supports_claim_ids, supports_repo_files, allowed_use, forbidden_use,
# boundary, status. Tiers: CANONICAL | SUPPORTING | CONTEXT_ONLY.
sources:
  - id: POPPER_FALSIFIABILITY
    tier: CANONICAL
    canonical_citation: "Popper, K. R. (1959/2002). The Logic of Scientific Discovery. Routledge."
    url: "https://archive.org/details/logicofscientifi0000popp"
    domain: philosophy_of_science
    supports_claim_ids: [TRI-CLAIM-006, TRI-CLAIM-008, TRI-CLAIM-010, TRI-CLAIM-013, TRI-CLAIM-023]
    supports_repo_files: [docs/SPEC.md, claims.yaml, prereg/]
    allowed_use: "Frames the claim->falsifier->evidence->boundary admission grammar."
    forbidden_use: "Does not prove any TRI-Falsify result is true; falsifiability is demarcation, not correctness."
    boundary: "Workflow-structure justification only; never a correctness warrant."
    status: ACTIVE
  - id: LAKATOS_RESEARCH_PROGRAMMES
    tier: CANONICAL
    canonical_citation: "Lakatos, I. (1970). Falsification and the Methodology of Scientific Research Programmes. In Criticism and the Growth of Knowledge. Cambridge University Press."
    url: "https://doi.org/10.1017/CBO9781139171434.009"
    domain: philosophy_of_science
    supports_claim_ids: [TRI-CLAIM-005, TRI-CLAIM-011, TRI-CLAIM-017]
    supports_repo_files: [docs/reports/LINEAGE_STATE.md, evidence/]
    allowed_use: "Frames the preserved v1..v9 lineage as one research programme with sealed negatives."
    forbidden_use: "Does not prove the programme is progressive."
    boundary: "Lineage-governance context; not empirical evidence."
    status: ACTIVE
  - id: KUHN_PARADIGMS
    tier: CONTEXT_ONLY
    canonical_citation: "Kuhn, T. S. (1962/1970). The Structure of Scientific Revolutions. University of Chicago Press."
    url: "https://archive.org/details/structureofscien0000kuhn"
    domain: philosophy_of_science
    supports_claim_ids: [TRI-CLAIM-005]
    supports_repo_files: [docs/reports/LINEAGE_STATE.md]
    allowed_use: "Contrast only: anomalies are preserved, not absorbed."
    forbidden_use: "Never an endorsement or supporting evidence."
    boundary: "Contrast only; a CONTEXT_ONLY source never supports a positive claim."
    status: ACTIVE
  - id: RAO_BALLARD_1999
    tier: SUPPORTING
    canonical_citation: "Rao, R. P. N. & Ballard, D. H. (1999). Predictive coding in the visual cortex. Nature Neuroscience, 2(1), 79-87."
    url: "https://doi.org/10.1038/4580"
    domain: predictive_coding
    supports_claim_ids: [TRI-CLAIM-019, TRI-CLAIM-020]
    supports_repo_files: [README.md, docs/SPEC.md, src/ctios/agents.py]
    allowed_use: "Names the operational analogy: a learner updating from its own prediction error."
    forbidden_use: "Does not imply biological fidelity, neural-equivalence, or modelled cortex."
    boundary: "Inspiration only; does not imply biological fidelity."
    status: ACTIVE
  - id: FRISTON_FREE_ENERGY
    tier: CONTEXT_ONLY
    canonical_citation: "Friston, K. (2010). The free-energy principle: a unified brain theory? Nature Reviews Neuroscience, 11(2), 127-138."
