# SPDX-License-Identifier: MIT
# PINNED before any verdict run. Lineage #28: closes the sharpest open
# cell of #27's boundary map — the carrier confound (fire=1.00,
# detect=0.00: the mean-contrast detector alarmed for the wrong
# reason). New root cause: confound-robustness, not the #24/#25
# observable cold-start. Replace mean two-window contrast with a WIDE
# MEDIAN/MAD contrast (robust to a bounded low-frequency carrier
# without knowing its period). No threshold edited after results.

hid: carrier_robust_observable

# 1. FALSIFICATION ANCHOR
# This fails if: a wide median/MAD two-window contrast, λ calibrated to
# false-alarm <= alpha on the HELD-OUT Gaussian null, does NOT detect
# the rupture under the CARRIER-CONFOUNDED family at >= tau, OR its
# OOD null-family false-alarm exceeds alpha, OR the in-scope Gaussian
# positive does not replicate (>= tau), OR a degenerate fake passes the
# gated checks.
# I will test this by: one pinned run — λ from Gaussian null calib
# seeds 100..115; evaluation on family seeds 0..11; two adversarial
# fakes scored by the same gates.
falsification_anchor: >-
  carrier-robustness is FALSE if carrier_detect_rate < tau, or
  null_family_false_alarm > alpha, or gaussian_detect_rate < tau, or a
  degenerate fake passes both gated checks.

# 2. OPERATIONAL BOUNDARY (numbers; not period-peeking)
# observable S_t = |median(o[t-w:t]) - median(o[t-W-w:t-w])|
#                  / (pooled_MAD + eps), MAD = median(|x - median(x)|).
# Wide windows w=60, W=180 (warmup=240) chosen a priori as "wide enough
# for a bounded low-frequency confound" — NOT fitted to any carrier
# period (the detector never sees the period). alpha=0.10, tau=0.50,
# 12 eval seeds, hit window [t*, t*+0.2n].
operational_boundary: >-
  wide median/MAD two-window contrast; λ = (1-alpha) quantile of
  per-stream max over Gaussian held-out null; w=60, W=180, warmup=240.

# 3. VERDICT METRICS (pre-registered; post-hoc forbidden)
metrics:
  calib_lambda:            {dir: report_only, threshold: null, window: "gaussian null calib 100..115", agg: quantile}
  carrier_detect_rate:     {dir: higher_better, threshold: 0.50, window: "CarrierConfoundedRuptureFamily 0..11, [t*,t*+0.2n]", agg: mean}
  null_family_false_alarm: {dir: lower_better, threshold: 0.10, window: "NullNoRuptureFamily 0..11", agg: mean}
  gaussian_detect_rate:    {dir: higher_better, threshold: 0.50, window: "SingleRuptureGaussianFamily 0..11, [t*,t*+0.2n]", agg: mean}
  always_fake_blocked:     {dir: higher_better, threshold: 1.0, window: "adversarial", agg: bool}
  never_fake_blocked:      {dir: higher_better, threshold: 1.0, window: "adversarial", agg: bool}
  leakage:                 {dir: lower_better, threshold: 0.0, window: "structural", agg: max}

thresholds:
  min_carrier_detect: 0.50
  max_null_family_fa: 0.10
  min_gaussian_detect: 0.50
  min_always_blocked: 1.0
  min_never_blocked: 1.0
  max_leakage: 0.0

checks:
  - {metric: carrier_detect_rate,     op: ">=", threshold_key: min_carrier_detect}
  - {metric: null_family_false_alarm, op: "<=", threshold_key: max_null_family_fa}
  - {metric: gaussian_detect_rate,    op: ">=", threshold_key: min_gaussian_detect}
  - {metric: always_fake_blocked,     op: ">=", threshold_key: min_always_blocked}
  - {metric: never_fake_blocked,      op: ">=", threshold_key: min_never_blocked}
  - {metric: leakage,                 op: "<=", threshold_key: max_leakage}

claim: >-
  A wide median/MAD two-window contrast, calibrated on the Gaussian
  held-out null, detects the rupture UNDER an additive bounded carrier
  confound while still holding the OOD null false-alarm bound and
  replicating the in-scope Gaussian positive; detect-everything and
  detect-nothing fakes cannot.
"null": >-
  The carrier still defeats it (carrier_detect_rate < tau), or the
  null bound / Gaussian positive breaks, or a fake passes both.

assumptions:
  - Agent receives only the observation stream; never the carrier
    period or amplitude.
  - λ calibrated on Gaussian held-out null; eval seeds disjoint.
  - Synthetic families, deterministic per seed, numpy-only, offline.

variables:
  - carrier_robust_detector (candidate)
  - always_fire_fake (adversarial)
  - never_fire_fake (adversarial)

# 4. ADVERSARIAL NULL
adversarial_null: >-
  AlwaysFire fails null_family_false_alarm; NeverFire fails the detect
  gates. Each fails >=1 gated check.

# 5. CLAIM BOUNDARY (enumerated)
forbidden_claims:
  - NOT a model of brain, neurons, or biological cognition.
  - NOT consciousness, sentience, intelligence, or AGI.
  - NOT a universal theory of time or perception.
  - NOT a proof of any private theorem.
  - GREEN means carrier-robust detection on SYNTHETIC families only;
    no generalization beyond them is claimed.

# 6. MINIMAL KILL TEST
kill_test: >-
  always-fire fake must fail null_family_false_alarm; the verdict over
  it must NOT be GREEN.
claim_boundary: >-
  Engineering property (carrier-robust windowed change detection) on
  synthetic families; not biology, cognition, AGI, or theory of time.
