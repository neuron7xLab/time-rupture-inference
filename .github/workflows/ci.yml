name: gate

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  proof-of-life:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history: gate verifies prereg-before-run
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -q numpy matplotlib pyyaml pytest ruff mypy
      - name: lint
        run: ruff check src tests scripts
      - name: type (mypy --strict)
        run: mypy
      - name: claim-lexicon lint (audit P1 — no interpretation inflation)
        run: python scripts/claims_lint.py
      - name: provenance attestation (audit P1 #3 — internal layer)
        run: python scripts/provenance_attest.py
      - name: tests
        run: PYTHONPATH=src pytest tests -q
      - name: fail-closed gate (30 seeds × 3 shifts)
        run: PYTHONPATH=src python -m ctios.runner --mode full
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evidence-py${{ matrix.python-version }}
          path: |
            evidence/
            plots/
