name: nctp-promotion-audit

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nctp-promotion-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install -q -r requirements-ci.lock
      - name: lint NCTP promotion audit
        run: ruff check tools/nctp_promotion_audit.py
      - name: run NCTP promotion audit
        run: PYTHONPATH=src python tools/nctp_promotion_audit.py
