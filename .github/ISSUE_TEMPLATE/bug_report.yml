name: Bug report
description: Report a reproducible defect in code, tests, docs, or tooling.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Exact commands, inputs, branch, and observed output.
      placeholder: |
        git rev-parse HEAD
        PYTHONPATH=src pytest tests -q
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Boundary
      description: What does this bug not imply? Avoid expanding scientific claims.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, failing test names, artifact paths, or screenshots.
    validations:
      required: false
