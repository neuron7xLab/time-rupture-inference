name: nctp-state-smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nctp-state-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install -q -r requirements-ci.lock
      - name: lint adaptive state slice
        run: ruff check src/ctios/nctp_state tools/nctp_state_smoke.py
      - name: type adaptive state slice
        run: mypy --strict src/ctios/nctp_state
      - name: run adaptive state smoke
        run: PYTHONPATH=src python tools/nctp_state_smoke.py
