name: indi-demo-gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  indi-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: external review package — one-command verification
        run: bash scripts/indi_demo.sh
