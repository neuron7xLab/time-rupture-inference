name: gate

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof-of-life:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0          # full history: gate verifies prereg-before-run
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: verifier trust boundary (independent root, stdlib-only)
        run: |
          python tools/check_verifier_manifest_static.py --repo .
          python tools/verifier_manifest.py
      - name: workflow trust audit (SHA pins + least privilege, stdlib)
        run: python scripts/audit_workflow_trust.py
      - name: dependency trust audit (CI consumes pinned lock, stdlib)
        run: python scripts/verify_ci_deps.py
      - name: supply-chain trust aggregate (fail-closed, stdlib)
        run: |
          python scripts/verify_scorecard_prerequisites.py
          PYTHONPATH=src python -m ctios.supply_chain_audit
      - run: pip install -q -r requirements-ci.lock
      - name: lint
        run: ruff check src tests scripts
      - name: type (mypy --strict, explicit target — not config-dependent)
        run: mypy --strict src/ctios
      - name: claim-lexicon lint (audit P1 — no interpretation inflation)
        run: python scripts/claims_lint.py
      - name: documentation trust gate (claim/source/boundary, stdlib+yaml)
        run: |
          python scripts/build_doc_trust_audit.py --verify-only
          python scripts/check_doc_claim_sources.py
          python scripts/check_doc_trust.py
      - name: provenance attestation (audit P1 #3 — internal layer)
        run: python scripts/provenance_attest.py
      - name: tests
        run: PYTHONPATH=src pytest tests -q
      - name: cyber hygiene staged governance gate (telemetry + governance)
        run: make cyber-hygiene-full
      - name: fail-closed gate (30 seeds × 3 shifts)
        run: PYTHONPATH=src python -m ctios.runner --mode full
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: evidence-py${{ matrix.python-version }}
          path: |
            evidence/
            plots/

  external-adversarial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -q -r requirements-ci.lock   # offline-capable, pinned
      - name: external adversarial portability demo (required)
        run: bash scripts/external_adversarial_demo.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: adversarial-portability-report
          path: |
            evidence/ADVERSARIAL_PORTABILITY_*.json
            docs/ADVERSARIAL_PORTABILITY_REPORT.md
