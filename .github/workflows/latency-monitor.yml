name: latency-monitor

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  latency-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install -q -r requirements-ci.lock
      - run: ruff check src/ctios/observability tools/latency_monitor_check.py
      - run: mypy --strict src/ctios/observability
      - run: PYTHONPATH=src python tools/latency_monitor_check.py
