  - id: WALSH_PREDICTIVE_PROCESSING_REVIEW_2023
    tier: CONTEXT_ONLY
    canonical_citation: "Walsh, K. S., McGovern, D. P., Clark, A. & O'Connell, R. G. (2023). Evaluating the neurophysiological evidence for predictive processing as a model of perception. Annals of the New York Academy of Sciences, 1524(1), 6-33."
