name: MS-SN v1.0.0 Deterministic Gate
on:
  pull_request:
    paths:
      - "docs/research/MS_SN_v1_0_0_NOTE.md"
      - "docs/research/MS_SN_v1_0_0_TEST_PROTOCOL.md"
      - "src/ctios/ms_sn_runtime.py"
      - "tests/test_ms_sn_*.py"
      - "configs/ms_sn_v1_0_0.yaml"
      - "scripts/ms_sn_evidence.py"
      - ".github/workflows/ms-sn-v1.yml"
permissions:
  contents: read

jobs:
  ms-sn-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gate: [ms-sn-prereg-lock, ms-sn-runtime-red, ms-sn-runtime-green, ms-sn-reproducibility, ms-sn-evidence-seal]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-ci.lock
      - run: pip install -e . --no-deps
      - run: make ${{ matrix.gate }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: evidence-${{ matrix.gate }}
          path: evidence/ms_sn_v1_0_0/
