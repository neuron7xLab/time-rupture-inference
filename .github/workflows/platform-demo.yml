name: platform-demo

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  platform-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -q -r requirements-ci.lock && pip install -q -e . --no-deps
      - name: pytest
        run: PYTHONPATH=src pytest tests -q
      - name: IP-safe platform demo
        run: bash scripts/platform_demo.sh
